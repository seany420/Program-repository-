<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDJ · Project Repository</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0f;color:#c8c4bc;font-family:'JetBrains Mono','Fira Mono','Courier New',monospace;height:100vh;overflow:hidden}
#root{height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0d0d0f}::-webkit-scrollbar-thumb{background:#222}
select option{background:#0d0d0f;color:#c8c4bc}
a{text-decoration:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const STATUS_COLORS = {
  "Live":"#4a7a4a","Active":"#4a6a7a","In Progress":"#7a6a2a",
  "Complete":"#555","On Hold":"#6a3a2a","Archived":"#333"
};
const CAT_SIGILS = {
  "Apps & Tools":"⬡","Clinical & Research":"⊕",
  "Writing":"◈","Philosophy & ON":"∅","Personal":"◇"
};
const CATEGORIES = ["All","Apps & Tools","Clinical & Research","Writing","Philosophy & ON","Personal"];
const STATUSES = ["Active","In Progress","Complete","Live","On Hold","Archived"];
const SK = "sdj-repo-v4";

const DEFAULTS = [
  {id:"feed-the-thing",title:"Feed The Thing",category:"Apps & Tools",status:"Live",description:"Horror-themed gamified writing habit app. Creature with streak mechanics, death/resurrection, graveyard, and .RTF/.TXT/.MD export.",tags:["horror","gamification","writing","github-pages"],url:"https://seany420.github.io",chatUrl:"https://claude.ai/chat/8523a412-b960-43a0-b549-8abe9e2a5062",notes:"seany420.github.io · Single-file HTML",updatedAt:"2026-06"},
  {id:"scream-profile",title:"Scream Profile / Horror Diagnosis",category:"Apps & Tools",status:"Active",description:"Horror-character psychological screening. 15 bipolar trait axes, radar chart, Predict-a-Friend mode.",tags:["horror","psychology","assessment"],url:"https://seany420.github.io/Horror-diagnosis/",chatUrl:"",notes:"seany420.github.io/Horror-diagnosis/",updatedAt:"2026-06"},
  {id:"clinical-ledger",title:"Clinical Ledger",category:"Clinical & Research",status:"Active",description:"33+ validated instruments, DSM-5-TR pattern matching, Bayesian probability engine, pharmacotherapy decision trees, biopsychosocial formulation engine.",tags:["clinical","DSM-5","assessment","Bayesian"],url:"",chatUrl:"",notes:"Single-file HTML",updatedAt:"2026-06"},
  {id:"mission-control",title:"Mission Control",category:"Apps & Tools",status:"Active",description:"Personal health/wellness PWA. Nutrition/GI-GL tracking, labs, Apple Watch metrics, medication management.",tags:["health","PWA","wellness","nutrition"],url:"",chatUrl:"",notes:"Personal use",updatedAt:"2026-06"},
  {id:"ifs-bpd",title:"IFS-BPD Screening Tool",category:"Clinical & Research",status:"Complete",description:"Quiet BPD screening. v3: 12 subscales, 36 items, dual self-report/clinician registers, Blob export. Grounded in BSL-23, rejection sensitivity, RO-DBT overcontrol.",tags:["BPD","screening","psychometrics","quiet-BPD"],url:"",chatUrl:"https://claude.ai/chat/058a0b80-c587-4bfb-8e26-84774911d6b6",notes:"v3 complete",updatedAt:"2026-06"},
  {id:"pt-hep",title:"PT Home Exercise Program",category:"Personal",status:"Live",description:"Digital PT reference from 16 pages of paper HEP leaflets. 26 exercises (hip/piriformis/core/lumbar) with SVG illustrations, Daily Plan tab (4 timed sessions), filterable cards.",tags:["PT","health","hip","piriformis","exercise"],url:"",chatUrl:"https://claude.ai/chat/158d67cb-34ac-4b37-b50b-dedfbad5efbb",notes:"Built June 2026. Replaced paper copies.",updatedAt:"2026-06"},
  {id:"ocd-viz",title:"OCD Brain Neuroscience Visualization",category:"Apps & Tools",status:"Complete",description:"Interactive visualization of the CSTC circuit and its role in OCD. Built for educational/clinical use.",tags:["OCD","neuroscience","visualization","CSTC"],url:"",chatUrl:"https://claude.ai/chat/ff592af9-516a-4d0d-b53d-d378b0c046b6",notes:"Built Sept 2025",updatedAt:"2025-09"},
  {id:"burnout-apps",title:"Burnout Review Cards + Flashcard Apps",category:"Apps & Tools",status:"Complete",description:"Two apps for the UCSD burnout presentation. Review Cards (35 slide anchors, Zoom cues). Flashcard app from color-coded narration script — Browse and 3D Flip modes.",tags:["burnout","clinical","flashcards","presentation"],url:"",chatUrl:"https://claude.ai/chat/38099a43-b4f6-446f-b86f-2f28a51ad447",notes:"burnout-review-cards.html + burnout-flashcards.html",updatedAt:"2026-05"},
  {id:"mbi-aaqii-decks",title:"MBI & AAQ-II PowerPoint Decks",category:"Clinical & Research",status:"Complete",description:"MBI-HSS: 5-slide deck across 3 subscales. AAQ-II: 3-slide deck with all 10 items. Both include response boxes, clinical threshold bands, APA citations.",tags:["MBI","AAQ-II","PowerPoint","burnout","ACT"],url:"",chatUrl:"https://claude.ai/chat/8489f9fa-696b-4016-85d9-c0838a467d92",notes:"Built with pptxgenjs",updatedAt:"2026-05"},
  {id:"obsidian-vaults",title:"Obsidian Philosophy Vaults",category:"Philosophy & ON",status:"Active",description:"7 drop-in vaults: Adler, Marx, Weber, Nietzsche (Will to Power), Becker (Denial of Death), Worm at the Core, TMT Handbook. Each: MOC, book structure, concepts, Sean-tuned synthesis, glossary.",tags:["Obsidian","philosophy","ON","TMT","Becker","Nietzsche"],url:"",chatUrl:"https://claude.ai/chat/c55afd47-ebd3-47a7-a9b1-2b1c71f181d8",notes:"All 7 delivered June 2026. Drop-in zip format.",updatedAt:"2026-06"},
  {id:"cheerful-void",title:"The Cheerful Void",category:"Writing",status:"Active",description:"Substack. Provocative and philosophical — clinician to general reader. Essays on optimistic nihilism, burnout, and horror as a clinical/philosophical lens.",tags:["Substack","writing","ON","burnout","horror"],url:"",chatUrl:"",notes:"Active publishing",updatedAt:"2026-06"},
  {id:"on-book",title:"Positive Nihilism: Finding Freedom in Meaninglessness",category:"Writing",status:"In Progress",description:"Nonfiction manuscript. 12-chapter skeleton, 4 parts. Composite character Maya (hospice nurse). Four-beat chapter architecture. Horror peaks Part II, ON delivered Part III.",tags:["book","ON","burnout","horror","philosophy","Maya"],url:"",chatUrl:"https://claude.ai/chat/fcbccee3-565a-490f-a915-9ea305dcaa59",notes:"~75k words raw material. Chapter grid + PDF reference produced.",updatedAt:"2026-05"},
  {id:"horror-movies-manual",title:"Horror Movies in Therapy — Clinical Manual",category:"Writing",status:"In Progress",description:"Clinical manual mapping horror archetypes to DSM-5-TR presentations. 20 chapters planned, 14 completed. Full session protocols, case examples, clinical tools.",tags:["horror","clinical","manual","archetypes","therapy"],url:"",chatUrl:"https://claude.ai/chat/a080b8aa-d740-41d7-9c32-3bd5784fab9f",notes:"Lives in 'Clinical Application of Horror Movies in Therapy' Claude Project",updatedAt:"2025-10"},
  {id:"on-act-guide",title:"ON for Anxiety — ACT Facilitator's Guide",category:"Writing",status:"Complete",description:"Comprehensive facilitator's guide for Optimistic Nihilism as an ACT-based anxiety treatment approach.",tags:["ON","ACT","anxiety","facilitator"],url:"",chatUrl:"",notes:"Sept 2025",updatedAt:"2025-09"},
  {id:"onas-pfus",title:"ONAS / PFUS Scales",category:"Clinical & Research",status:"Complete",description:"Two self-developed psychometric instruments. ONAS (Optimistic Nihilism Attitudes Scale) and PFUS (Psychological Flexibility Under Stress).",tags:["psychometrics","research","ON","scales"],url:"",chatUrl:"",notes:"Peer-review potential",updatedAt:"2026-06"},
  {id:"qi-manuscript",title:"IBH Peer Review QI Manuscript",category:"Clinical & Research",status:"In Progress",description:"UCSD Health IBH peer review QI research. 2 rounds, 3 matched providers. R1 mean 53.22% → R2 88.53%, matched gain +27.36pp. Expanded intro: PCBH, CoCM, MBC frameworks.",tags:["QI","UCSD","IBH","PCBH","manuscript","MBC"],url:"",chatUrl:"https://claude.ai/chat/e0be3f6d-19ff-4c90-9ea5-070fca776140",notes:"Ongoing",updatedAt:"2026-05"},
  {id:"extract",title:"EXTRACT Research Tool",category:"Apps & Tools",status:"Complete",description:"Research extraction tool for analyzing academic articles through TMT, existential psychology, horror, and ACT lenses.",tags:["research","TMT","ACT","Obsidian"],url:"",chatUrl:"",notes:"Built for ON framework pipeline",updatedAt:"2026-06"},
  {id:"burnout-presentation",title:"UCSD Burnout Presentation",category:"Clinical & Research",status:"Complete",description:"~60-min Zoom presentation on individual-level burnout management. Covered MBI, AAQ-II, ON framework, Stages of Change, PDSA cycles. Mixed clinical/admin UCSD audience.",tags:["burnout","UCSD","presentation","MBI","ON"],url:"",chatUrl:"https://claude.ai/chat/93a5bad5-47d9-4e1b-97cb-3d684566ea01",notes:"Delivered 2026",updatedAt:"2026-05"},
];

function genId(){return"p"+Date.now()+Math.random().toString(36).slice(2,5)}

function Repo(){
  const [projects,setProjects]=useState([]);
  const [cat,setCat]=useState("All");
  const [q,setQ]=useState("");
  const [selId,setSelId]=useState(null);
  const [mode,setMode]=useState("view");
  const [ed,setEd]=useState(null);
  const [tagIn,setTagIn]=useState("");
  const [ready,setReady]=useState(false);

  useEffect(()=>{
    try{const d=localStorage.getItem(SK);setProjects(d?JSON.parse(d):DEFAULTS);}
    catch{setProjects(DEFAULTS);}
    setReady(true);
  },[]);

  function persist(p){setProjects(p);try{localStorage.setItem(SK,JSON.stringify(p));}catch{}}
  const list=projects.filter(p=>{
    const cOk=cat==="All"||p.category===cat;
    const sq=q.toLowerCase();
    const qOk=!sq||p.title.toLowerCase().includes(sq)||p.description.toLowerCase().includes(sq)||(p.tags||[]).some(t=>t.includes(sq));
    return cOk&&qOk;
  });
  const sel=projects.find(p=>p.id===selId);
  function startAdd(){setEd({id:genId(),title:"",category:"Apps & Tools",status:"Active",description:"",tags:[],url:"",chatUrl:"",notes:"",updatedAt:new Date().toISOString().slice(0,7)});setMode("add");setTagIn("");setSelId(null);}
  function startEdit(p){setEd({...p,tags:[...(p.tags||[])]});setMode("edit");setTagIn("");}
  function cancel(){setMode("view");setEd(null);}
  function saveForm(){
    const proj={...ed,updatedAt:new Date().toISOString().slice(0,7)};
    const up=mode==="edit"?projects.map(p=>p.id===proj.id?proj:p):[...projects,proj];
    persist(up);setSelId(proj.id);setMode("view");setEd(null);
  }
  function del(id){if(!confirm("Remove this project?"))return;persist(projects.filter(p=>p.id!==id));setSelId(null);}
  function addTag(){const t=tagIn.trim().toLowerCase();if(t&&!(ed.tags||[]).includes(t))setEd(d=>({...d,tags:[...(d.tags||[]),t]}));setTagIn("");}

  const isForm=mode==="edit"||mode==="add";

  const C={
    wrap:{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden"},
    hdr:{borderBottom:"1px solid #1a1a1e",padding:"13px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0},
    hTitle:{fontSize:13,fontWeight:700,letterSpacing:"0.18em",textTransform:"uppercase",color:"#e8e4dc"},
    hMeta:{fontSize:9,color:"#333",letterSpacing:"0.1em",marginLeft:12},
    addBtn:{background:"none",border:"1px solid #2a2a2a",color:"#9a7a30",fontSize:10,letterSpacing:"0.1em",padding:"4px 12px",cursor:"pointer",textTransform:"uppercase",fontFamily:"inherit"},
    body:{display:"flex",flex:1,minHeight:0,overflow:"hidden"},
    sidebar:{width:155,borderRight:"1px solid #181818",flexShrink:0,padding:"12px 0",overflowY:"auto"},
    catBtn:(a)=>({display:"flex",alignItems:"center",gap:6,width:"100%",background:a?"#161618":"none",border:"none",borderLeft:a?"2px solid #8b2020":"2px solid transparent",color:a?"#e8e4dc":"#444",fontSize:9,letterSpacing:"0.09em",textTransform:"uppercase",padding:"7px 14px",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}),
    listPane:{width:255,borderRight:"1px solid #181818",display:"flex",flexDirection:"column",flexShrink:0},
    searchBox:{padding:"9px 10px",borderBottom:"1px solid #181818"},
    searchIn:{width:"100%",background:"#0d0d0f",border:"1px solid #1f1f22",color:"#c8c4bc",fontSize:10,padding:"5px 8px",fontFamily:"inherit",outline:"none",boxSizing:"border-box"},
    countLbl:{padding:"5px 10px 4px",fontSize:9,color:"#2a2a2a",letterSpacing:"0.1em",textTransform:"uppercase",borderBottom:"1px solid #111"},
    listScroll:{overflowY:"auto",flex:1},
    li:(a)=>({padding:"10px 10px",borderBottom:"1px solid #111",cursor:"pointer",background:a?"#161618":"none",borderLeft:a?"2px solid #8b2020":"2px solid transparent"}),
    liTitle:(a)=>({fontSize:11,color:a?"#e8e4dc":"#888",fontWeight:a?700:400,marginBottom:3}),
    liSub:{fontSize:9,color:"#2f2f2f",textTransform:"uppercase",letterSpacing:"0.07em"},
    liLinks:{display:"flex",gap:6,marginTop:5},
    liLinkBtn:{fontSize:8,letterSpacing:"0.08em",padding:"2px 7px",border:"1px solid #222",background:"none",cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase"},
    detail:{flex:1,padding:"22px 26px",overflowY:"auto"},
    empty:{color:"#1e1e1e",textAlign:"center",marginTop:70,letterSpacing:"0.1em"},
    caseHdr:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16},
    caseTitle:{fontSize:15,color:"#e8e4dc",fontWeight:700},
    caseMeta:{fontSize:9,color:"#3a3a3a",letterSpacing:"0.08em",marginTop:3},
    badge:(st)=>({background:STATUS_COLORS[st]||"#333",color:"#c8c4bc",fontSize:8,letterSpacing:"0.12em",textTransform:"uppercase",padding:"3px 9px",marginLeft:10,flexShrink:0,marginTop:2,display:"inline-block"}),
    launchRow:{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"},
    launchBtn:{fontSize:10,letterSpacing:"0.1em",padding:"6px 14px",border:"1px solid",cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase",textDecoration:"none",display:"inline-block"},
    sec:{marginBottom:16},
    secLbl:{fontSize:9,color:"#3a3a3a",letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:4,borderBottom:"1px solid #181818",paddingBottom:3},
    secTxt:{fontSize:11,color:"#888",lineHeight:1.7},
    tagWrap:{display:"flex",flexWrap:"wrap",gap:5,marginTop:3},
    tag:{background:"#161618",border:"1px solid #222",color:"#484848",fontSize:9,padding:"2px 6px"},
    actions:{display:"flex",gap:8,marginTop:20,borderTop:"1px solid #181818",paddingTop:16},
    btn:{background:"none",border:"1px solid #222",color:"#c8c4bc",fontSize:9,letterSpacing:"0.1em",padding:"5px 12px",cursor:"pointer",textTransform:"uppercase",fontFamily:"inherit"},
    delBtn:{border:"1px solid #1e0e0e",color:"#4a1a1a"},
    form:{maxWidth:500},
    fTitle:{fontSize:11,color:"#e8e4dc",letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:20},
    field:{marginBottom:12},
    lbl:{display:"block",fontSize:9,color:"#3a3a3a",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4},
    inp:{width:"100%",background:"#0d0d0f",border:"1px solid #1f1f22",color:"#c8c4bc",fontSize:11,padding:"5px 8px",fontFamily:"inherit",outline:"none",boxSizing:"border-box"},
    txa:{width:"100%",background:"#0d0d0f",border:"1px solid #1f1f22",color:"#c8c4bc",fontSize:11,padding:"5px 8px",fontFamily:"inherit",outline:"none",resize:"vertical",minHeight:65,boxSizing:"border-box"},
    sel:{width:"100%",background:"#0d0d0f",border:"1px solid #1f1f22",color:"#c8c4bc",fontSize:11,padding:"5px 8px",fontFamily:"inherit",outline:"none",boxSizing:"border-box"},
    frow:{display:"flex",gap:10,marginBottom:12},
    tagRow:{display:"flex",gap:7},
    tagAddBtn:{background:"none",border:"1px solid #222",color:"#9a7a30",fontSize:9,padding:"5px 10px",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"},
    rTag:{background:"#161618",border:"1px solid #222",color:"#484848",fontSize:9,padding:"2px 6px",display:"inline-flex",alignItems:"center",gap:4,margin:"3px 3px 0 0"},
    rTagX:{background:"none",border:"none",color:"#5a2020",cursor:"pointer",fontSize:10,padding:0},
    saveBtn:{background:"#161618",border:"1px solid #2a2a2a",color:"#e8e4dc",fontSize:9,letterSpacing:"0.12em",padding:"6px 16px",cursor:"pointer",textTransform:"uppercase",fontFamily:"inherit"},
    cancelBtn:{background:"none",border:"1px solid #181818",color:"#333",fontSize:9,letterSpacing:"0.1em",padding:"6px 12px",cursor:"pointer",textTransform:"uppercase",fontFamily:"inherit"},
    hint:{fontSize:9,color:"#333",letterSpacing:"0.08em",marginTop:4},
  };

  if(!ready)return<div style={{...C.wrap,justifyContent:"center",alignItems:"center"}}><span style={{color:"#222",letterSpacing:"0.2em"}}>LOADING...</span></div>;

  return(
    <div style={C.wrap}>
      <div style={C.hdr}>
        <div style={{display:"flex",alignItems:"baseline"}}>
          <span style={C.hTitle}>Project Repository</span>
          <span style={C.hMeta}>SDJ · {projects.length} entries</span>
        </div>
        <button style={C.addBtn} onClick={startAdd}>+ New</button>
      </div>

      <div style={C.body}>
        {/* Sidebar */}
        <div style={C.sidebar}>
          {CATEGORIES.map(c=>(
            <button key={c} style={C.catBtn(cat===c)} onClick={()=>{setCat(c);setSelId(null);cancel();}}>
              {c!=="All"&&<span style={{opacity:0.35}}>{CAT_SIGILS[c]}</span>}
              {c==="All"?"All":c}
            </button>
          ))}
        </div>

        {/* List */}
        <div style={C.listPane}>
          <div style={C.searchBox}>
            <input style={C.searchIn} placeholder="Search..." value={q} onChange={e=>setQ(e.target.value)}/>
          </div>
          <div style={C.countLbl}>{list.length} project{list.length!==1?"s":""}</div>
          <div style={C.listScroll}>
            {list.map(p=>(
              <div key={p.id} style={C.li(selId===p.id)} onClick={()=>{setSelId(p.id);cancel();}}>
                <div style={C.liTitle(selId===p.id)}>{p.title}</div>
                <div style={C.liSub}><span style={{color:STATUS_COLORS[p.status]||"#333"}}>■</span> {p.status} · {p.category}</div>
                {(p.url||p.chatUrl)&&(
                  <div style={C.liLinks} onClick={e=>e.stopPropagation()}>
                    {p.chatUrl&&<a href={p.chatUrl} target="_blank" rel="noreferrer" style={{...C.liLinkBtn,color:"#9a7a30",borderColor:"#2a2010"}}>↗ Chat</a>}
                    {p.url&&<a href={p.url} target="_blank" rel="noreferrer" style={{...C.liLinkBtn,color:"#4a7a4a",borderColor:"#1a2a1a"}}>↗ Live</a>}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>

        {/* Detail */}
        <div style={C.detail}>
          {isForm?(
            <div style={C.form}>
              <div style={C.fTitle}>{mode==="add"?"// New Project":"// Edit"}</div>

              <div style={C.field}>
                <label style={C.lbl}>Title</label>
                <input style={C.inp} value={ed.title} onChange={e=>setEd(d=>({...d,title:e.target.value}))}/>
              </div>

              <div style={C.frow}>
                <div style={{flex:1}}>
                  <label style={C.lbl}>Category</label>
                  <select style={C.sel} value={ed.category} onChange={e=>setEd(d=>({...d,category:e.target.value}))}>
                    {CATEGORIES.filter(c=>c!=="All").map(c=><option key={c}>{c}</option>)}
                  </select>
                </div>
                <div style={{flex:1}}>
                  <label style={C.lbl}>Status</label>
                  <select style={C.sel} value={ed.status} onChange={e=>setEd(d=>({...d,status:e.target.value}))}>
                    {STATUSES.map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
              </div>

              <div style={C.field}>
                <label style={C.lbl}>Description</label>
                <textarea style={C.txa} value={ed.description} onChange={e=>setEd(d=>({...d,description:e.target.value}))}/>
              </div>

              <div style={C.field}>
                <label style={C.lbl}>Claude Chat URL</label>
                <input style={C.inp} value={ed.chatUrl||""} placeholder="https://claude.ai/chat/..." onChange={e=>setEd(d=>({...d,chatUrl:e.target.value}))}/>
                <div style={C.hint}>Paste the URL of the Claude conversation where this was built</div>
              </div>

              <div style={C.field}>
                <label style={C.lbl}>Live URL (if deployed)</label>
                <input style={C.inp} value={ed.url||""} placeholder="https://seany420.github.io/..." onChange={e=>setEd(d=>({...d,url:e.target.value}))}/>
              </div>

              <div style={C.field}>
                <label style={C.lbl}>Notes</label>
                <textarea style={{...C.txa,minHeight:50}} value={ed.notes} onChange={e=>setEd(d=>({...d,notes:e.target.value}))}/>
              </div>

              <div style={C.field}>
                <label style={C.lbl}>Tags</label>
                <div style={C.tagRow}>
                  <input style={{...C.inp,flex:1}} value={tagIn} placeholder="tag..." onChange={e=>setTagIn(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addTag();}}}/>
                  <button style={C.tagAddBtn} onClick={addTag}>+ Add</button>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",marginTop:6}}>
                  {(ed.tags||[]).map(t=>(
                    <span key={t} style={C.rTag}>{t}
                      <button style={C.rTagX} onClick={()=>setEd(d=>({...d,tags:d.tags.filter(x=>x!==t)}))}>×</button>
                    </span>
                  ))}
                </div>
              </div>

              <div style={{display:"flex",gap:8,marginTop:18}}>
                <button style={C.saveBtn} onClick={saveForm}>Save</button>
                <button style={C.cancelBtn} onClick={cancel}>Cancel</button>
              </div>
            </div>

          ):!sel?(
            <div style={C.empty}>
              <div style={{fontSize:22,marginBottom:12}}>∅</div>
              <div>Select a project</div>
            </div>

          ):(
            <div>
              <div style={C.caseHdr}>
                <div>
                  <div style={C.caseTitle}>{sel.title}</div>
                  <div style={C.caseMeta}>{CAT_SIGILS[sel.category]} {sel.category} · {sel.updatedAt}</div>
                </div>
                <span style={C.badge(sel.status)}>{sel.status}</span>
              </div>

              {/* Launch buttons */}
              {(sel.chatUrl||sel.url)&&(
                <div style={C.launchRow}>
                  {sel.chatUrl&&(
                    <a href={sel.chatUrl} target="_blank" rel="noreferrer"
                      style={{...C.launchBtn,color:"#c8a84a",borderColor:"#3a2e10",background:"#111009"}}>
                      ↗ Open Claude Chat
                    </a>
                  )}
                  {sel.url&&(
                    <a href={sel.url} target="_blank" rel="noreferrer"
                      style={{...C.launchBtn,color:"#6aaa6a",borderColor:"#1a2e1a",background:"#091209"}}>
                      ↗ Open Live App
                    </a>
                  )}
                </div>
              )}

              <div style={C.sec}><div style={C.secLbl}>Description</div><div style={C.secTxt}>{sel.description}</div></div>
              {sel.notes&&<div style={C.sec}><div style={C.secLbl}>Notes</div><div style={C.secTxt}>{sel.notes}</div></div>}
              {sel.tags?.length>0&&(
                <div style={C.sec}>
                  <div style={C.secLbl}>Tags</div>
                  <div style={C.tagWrap}>{sel.tags.map(t=><span key={t} style={C.tag}>{t}</span>)}</div>
                </div>
              )}

              <div style={C.actions}>
                <button style={C.btn} onClick={()=>startEdit(sel)}>Edit</button>
                <button style={{...C.btn,...C.delBtn}} onClick={()=>del(sel.id)}>Remove</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Repo/>);
</script>
</body>
</html>
