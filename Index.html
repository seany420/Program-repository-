<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDJ · Project Repository</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0f;
    --surface: #1a1a1e;
    --border: #222;
    --border2: #1a1a1e;
    --text: #c8c4bc;
    --text-dim: #555;
    --text-bright: #e8e4dc;
    --accent: #8b2020;
    --gold: #9a7a30;
    --mono: 'JetBrains Mono', 'Fira Mono', 'Courier New', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; display: flex; flex-direction: column; }
  /* HEADER */
  #header { border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: baseline; justify-content: space-between; flex-shrink: 0; }
  #header h1 { font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-bright); font-weight: 700; }
  #header-meta { font-size: 9px; color: #333; letter-spacing: 0.1em; margin-left: 14px; }
  #add-btn { background: none; border: 1px solid var(--border); color: var(--gold); font-size: 10px; letter-spacing: 0.12em; padding: 5px 14px; cursor: pointer; text-transform: uppercase; font-family: var(--mono); }
  #add-btn:hover { border-color: var(--gold); }
  /* LAYOUT */
  #body { display: flex; flex: 1; min-height: 0; height: calc(100vh - 53px); }
  /* SIDEBAR */
  #sidebar { width: 170px; border-right: 1px solid var(--border2); padding: 16px 0; flex-shrink: 0; overflow-y: auto; }
  .cat-btn { background: none; border: none; color: #555; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 7px 18px; cursor: pointer; text-align: left; font-family: var(--mono); display: flex; align-items: center; gap: 7px; border-left: 2px solid transparent; width: 100%; transition: all 0.1s; }
  .cat-btn:hover { color: #aaa; }
  .cat-btn.active { background: var(--surface); color: var(--text-bright); border-left-color: var(--accent); }
  /* MAIN */
  #main { flex: 1; display: flex; min-width: 0; }
  /* LIST */
  #list-pane { width: 280px; border-right: 1px solid var(--border2); display: flex; flex-direction: column; flex-shrink: 0; }
  #search-wrap { padding: 10px 12px; border-bottom: 1px solid var(--border2); }
  #search { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: 11px; padding: 6px 9px; font-family: var(--mono); outline: none; }
  #count-label { padding: 5px 12px 4px; font-size: 9px; color: #333; letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid #111; }
  #list { overflow-y: auto; flex: 1; }
  .list-item { padding: 11px 12px; border-bottom: 1px solid #111; cursor: pointer; border-left: 2px solid transparent; transition: all 0.1s; }
  .list-item:hover { background: #131316; }
  .list-item.active { background: var(--surface); border-left-color: var(--accent); }
  .item-title { font-size: 11px; color: #aaa; margin-bottom: 3px; }
  .list-item.active .item-title { color: var(--text-bright); font-weight: 700; }
  .item-sub { font-size: 9px; color: #333; letter-spacing: 0.07em; text-transform: uppercase; }
  /* DETAIL */
  #detail-pane { flex: 1; padding: 24px 28px; overflow-y: auto; }
  .empty-state { color: #222; font-size: 11px; letter-spacing: 0.12em; text-align: center; margin-top: 80px; }
  .empty-icon { font-size: 24px; margin-bottom: 14px; }
  /* CASE DETAIL */
  .case-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
  .case-title { font-size: 17px; color: var(--text-bright); font-weight: 700; }
  .case-meta { font-size: 9px; color: #444; letter-spacing: 0.08em; margin-top: 4px; }
  .status-badge { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 10px; display: inline-block; flex-shrink: 0; margin-left: 12px; margin-top: 4px; }
  .section { margin-bottom: 18px; }
  .section-label { font-size: 9px; color: #444; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 5px; border-bottom: 1px solid var(--border2); padding-bottom: 4px; }
  .section-text { font-size: 11px; color: #aaa; line-height: 1.7; }
  .tag-wrap { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
  .tag { background: var(--surface); border: 1px solid #2a2a30; color: #555; font-size: 9px; padding: 2px 7px; letter-spacing: 0.07em; }
  .link { color: var(--gold); font-size: 11px; }
  .action-row { display: flex; gap: 8px; margin-top: 24px; }
  .action-btn { background: none; border: 1px solid var(--border); color: var(--text); font-size: 10px; letter-spacing: 0.1em; padding: 5px 14px; cursor: pointer; text-transform: uppercase; font-family: var(--mono); }
  .del-btn { border-color: #2a1a1a; color: #5a2a2a; }
  .action-btn:hover { border-color: #555; color: var(--text-bright); }
  .del-btn:hover { border-color: var(--accent); color: #aa4444; }
  /* FORM */
  #form-pane { max-width: 540px; }
  .form-title { font-size: 12px; color: var(--text-bright); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 22px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 9px; color: #444; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 5px; }
  .field input, .field textarea, .field select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-size: 11px; padding: 6px 9px; font-family: var(--mono); outline: none; }
  .field textarea { resize: vertical; min-height: 70px; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .tag-input-row { display: flex; gap: 7px; }
  .tag-input-row input { flex: 1; }
  .tag-add-btn { background: none; border: 1px solid var(--border); color: var(--gold); font-size: 10px; padding: 6px 12px; cursor: pointer; font-family: var(--mono); white-space: nowrap; }
  .removable-tag { background: var(--surface); border: 1px solid #2a2a30; color: #555; font-size: 9px; padding: 2px 7px; display: inline-flex; align-items: center; gap: 5px; margin: 3px 3px 0 0; }
  .remove-tag-btn { background: none; border: none; color: #5a2a2a; cursor: pointer; font-size: 10px; padding: 0; line-height: 1; }
  .save-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-bright); font-size: 10px; letter-spacing: 0.12em; padding: 7px 18px; cursor: pointer; text-transform: uppercase; font-family: var(--mono); }
  .cancel-btn { background: none; border: 1px solid var(--border2); color: #444; font-size: 10px; letter-spacing: 0.1em; padding: 7px 14px; cursor: pointer; text-transform: uppercase; font-family: var(--mono); }
  .form-actions { display: flex; gap: 8px; margin-top: 20px; }
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:baseline;gap:0">
    <h1>Project Repository</h1>
    <span id="header-meta"></span>
  </div>
  <button id="add-btn">+ New</button>
</div>

<div id="body">
  <div id="sidebar"></div>
  <div id="main">
    <div id="list-pane">
      <div id="search-wrap"><input id="search" placeholder="Search..." /></div>
      <div id="count-label"></div>
      <div id="list"></div>
    </div>
    <div id="detail-pane">
      <div class="empty-state"><div class="empty-icon">∅</div><div>Select a project to view</div></div>
    </div>
  </div>
</div>

<script>
const CATEGORIES = ["All", "Apps & Tools", "Clinical & Research", "Writing", "Philosophy & ON", "Personal"];
const STATUSES = ["Active", "In Progress", "Complete", "Live", "On Hold", "Archived"];
const STATUS_COLORS = { "Live": "#4a7a4a", "Active": "#4a6a7a", "In Progress": "#7a6a2a", "Complete": "#555", "On Hold": "#6a3a2a", "Archived": "#333" };
const CAT_SIGILS = { "Apps & Tools": "⬡", "Clinical & Research": "⊕", "Writing": "◈", "Philosophy & ON": "∅", "Personal": "◇" };

const DEFAULTS = [
  { id:"feed-the-thing", title:"Feed The Thing", category:"Apps & Tools", status:"Live", description:"Horror-themed gamified writing habit app. Tamagotchi-style creature with streak mechanics, death/resurrection, graveyard system, and writing pad with .RTF/.TXT/.MD export. Deployed to GitHub Pages.", tags:["horror","gamification","writing","habit","github-pages"], url:"https://seany420.github.io", notes:"Single-file HTML. seany420.github.io", updatedAt:"2026-06" },
  { id:"scream-profile", title:"Scream Profile / Horror Diagnosis", category:"Apps & Tools", status:"Active", description:"Horror-character psychological screening app with 15 bipolar trait axes, clinical/trait comparison radar chart, and Predict-a-Friend mode.", tags:["horror","psychology","assessment","radar-chart"], url:"https://seany420.github.io/Horror-diagnosis/", notes:"Single-file HTML.", updatedAt:"2026-06" },
  { id:"clinical-ledger", title:"Clinical Ledger", category:"Clinical & Research", status:"Active", description:"Comprehensive single-file HTML self-assessment app with 33+ validated instruments, DSM-5-TR pattern matching, Bayesian probability engine, pharmacotherapy decision trees, and biopsychosocial formulation engine.", tags:["clinical","DSM-5","assessment","Bayesian","formulation"], url:"", notes:"Major sustained build. Single-file HTML.", updatedAt:"2026-06" },
  { id:"mission-control", title:"Mission Control", category:"Apps & Tools", status:"Active", description:"Personal health/wellness PWA with nutrition/GI-GL tracking, lab tracking, Apple Watch metrics integration, and medication management.", tags:["health","PWA","wellness","nutrition"], url:"", notes:"Personal use app.", updatedAt:"2026-06" },
  { id:"ifs-bpd", title:"IFS-BPD Screening Tool", category:"Clinical & Research", status:"Complete", description:"Clinical screening tool for the internalizing/quiet BPD presentation. v3: 12 subscales, 36 items, dual self-report/clinician-administered registers, Blob-based HTML export. Informed by BSL-23, rejection sensitivity literature, RO-DBT overcontrol framework.", tags:["BPD","IFS","screening","psychometrics","quiet-BPD"], url:"", notes:"v3 complete.", updatedAt:"2026-06" },
  { id:"pt-hep", title:"PT Home Exercise Program", category:"Personal", status:"Live", description:"Digital physical therapy reference app built from 16 pages of paper HEP leaflets (Linda Harvey, Elizabeth Chien PT/DPT, UCSD Health, CDC/STEADI). 26 exercises (stretch & strengthen) for hip, piriformis, core, lumbar. SVG stick-figure illustrations, filterable cards with sets/reps/hold/freq, PT cue notes, and a Daily Plan tab with 4 timed sessions.", tags:["PT","health","hip","piriformis","exercise"], url:"", notes:"Replaced paper leaflets. Built June 2026.", updatedAt:"2026-06" },
  { id:"ocd-viz", title:"OCD Brain Neuroscience Visualization", category:"Apps & Tools", status:"Complete", description:"Interactive React visualization of the CSTC (Cortico-Striato-Thalamo-Cortical) circuit and its role in OCD. Built for educational/clinical use.", tags:["OCD","neuroscience","visualization","CSTC"], url:"", notes:"Built Sept 2025.", updatedAt:"2025-09" },
  { id:"burnout-apps", title:"Burnout Review Cards + Flashcard Apps", category:"Apps & Tools", status:"Complete", description:"Two companion apps built for the UCSD Health burnout Zoom presentation. (1) Review Cards app with Slide Anchors tab — 35 cards with delivery notes and Zoom-specific guidance. (2) Flashcard app parsed from color-coded narration script (green=anchor, blue=critical, yellow=important), with Browse and 3D Flip modes.", tags:["burnout","clinical","UCSD","flashcards","presentation"], url:"", notes:"Built May 2026. burnout-review-cards.html + burnout-flashcards.html", updatedAt:"2026-05" },
  { id:"mbi-aaqii-decks", title:"MBI & AAQ-II PowerPoint Decks", category:"Clinical & Research", status:"Complete", description:"Two polished clinical assessment PowerPoint presentations. MBI-HSS: 5-slide deck across Emotional Exhaustion, Depersonalization, Personal Achievement subscales. AAQ-II: 3-slide deck with all 10 items and scoring/interpretation. Both include response boxes, clinical threshold bands, and APA citations.", tags:["MBI","AAQ-II","PowerPoint","burnout","ACT","clinical"], url:"", notes:"Built with pptxgenjs. May 2026.", updatedAt:"2026-05" },
  { id:"obsidian-vaults", title:"Obsidian Philosophy Vaults", category:"Philosophy & ON", status:"Active", description:"Seven drop-in philosophy vaults: Adler (Courage to Be Disliked), Marx (Capital), Weber (Protestant Ethic), Nietzsche (Will to Power), Becker (Denial of Death), The Worm at the Core, TMT Handbook. Organized around ON framework for use with Claude Cowork. Each vault: MOC, book structure, concepts, synthesis (Sean-tuned crosswalk + criticisms), glossary.", tags:["Obsidian","philosophy","ON","TMT","Becker","Nietzsche"], url:"", notes:"Drop-in zip format. All 7 delivered as of June 2026.", updatedAt:"2026-06" },
  { id:"cheerful-void", title:"The Cheerful Void", category:"Writing", status:"Active", description:"Substack publication. Provocative and philosophical — bridging clinicians and general readers. Essays on optimistic nihilism, burnout, and horror as a clinical/philosophical lens.", tags:["Substack","writing","ON","burnout","horror"], url:"", notes:"Active publishing. ~75,000 words of ON-related content.", updatedAt:"2026-06" },
  { id:"on-book", title:"Positive Nihilism: Finding Freedom in Meaninglessness", category:"Writing", status:"In Progress", description:"Nonfiction manuscript. 12-chapter skeleton across 4 parts. Composite character Maya (hospice nurse) threads all three topics. Four-beat chapter architecture (cold open → turn inward → deepening → landing). Threads: horror peaks in Part II, burnout transforms from disease to signal, ON withheld until Ch.6 then delivered across Part III.", tags:["book","ON","burnout","horror","philosophy","Maya"], url:"", notes:"~75,000 words raw ON material. Chapter grid + PDF reference doc produced.", updatedAt:"2026-05" },
  { id:"horror-movies-manual", title:"Horror Movies in Therapy — Clinical Manual", category:"Writing", status:"In Progress", description:"Nonfiction clinical manual applying horror archetypes to therapy. 20-chapter structure. Chapters 1–14 completed across sessions. Remaining chapters 15–20 in progress. Stored in 'Clinical Application of Horror Movies in Therapy' project.", tags:["horror","clinical","manual","archetypes","therapy"], url:"", notes:"Chapters 14+ continuation. Lives in Claude Project.", updatedAt:"2025-10" },
  { id:"on-act-guide", title:"ON for Anxiety — ACT Facilitator's Guide", category:"Writing", status:"Complete", description:"Comprehensive facilitator's guide for Optimistic Nihilism as an approach to anxiety treatment, framed through ACT principles. Full structured guide produced.", tags:["ON","ACT","anxiety","facilitator","guide"], url:"", notes:"Produced Sept 2025.", updatedAt:"2025-09" },
  { id:"onas-pfus", title:"ONAS / PFUS", category:"Clinical & Research", status:"Complete", description:"Two custom psychometric scales. ONAS (Optimistic Nihilism Attitudes Scale) and PFUS (Psychological Flexibility Under Stress). Self-developed instruments with peer-review potential.", tags:["psychometrics","research","ON","scales"], url:"", notes:"", updatedAt:"2026-06" },
  { id:"qi-manuscript", title:"IBH Peer Review QI Manuscript", category:"Clinical & Research", status:"In Progress", description:"Integrated Behavioral Health peer review quality improvement research at UCSD Health. Two-round data (8 providers Round 1, 10 Round 2, 3 matched). Round 1 mean 53.22% → Round 2 88.53%. Matched-provider gain: +27.36 pp. Paper includes expanded intro (PCBH, CoCM, MBC frameworks) and statistical results section.", tags:["QI","UCSD","IBH","PCBH","manuscript","MBC"], url:"", notes:"Goldman (1994) ICC/reliability citation included. Ongoing.", updatedAt:"2026-05" },
  { id:"extract", title:"EXTRACT Research Tool", category:"Apps & Tools", status:"Complete", description:"Research extraction tool for analyzing academic articles through domain lenses: TMT, existential psychology, horror, ACT.", tags:["research","TMT","ACT","analysis","Obsidian"], url:"", notes:"Built for ON framework pipeline.", updatedAt:"2026-06" },
  { id:"burnout-presentation", title:"UCSD Burnout Presentation", category:"Clinical & Research", status:"Complete", description:"~60-minute Zoom presentation on managing burnout at individual level to mixed clinical/admin UCSD Health audience. Covered burnout definition, MBI, AAQ-II, coping, ON framework, resilience, Stages of Change, PDSA cycles.", tags:["burnout","UCSD","presentation","MBI","AAQ-II","ON"], url:"", notes:"Delivered 2026. Review cards app and flashcard app built to support.", updatedAt:"2026-05" }
];

const STORAGE_KEY = "sdj-project-repo-v2";

function load() {
  try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : DEFAULTS.map(p=>({...p})); }
  catch { return DEFAULTS.map(p=>({...p})); }
}
function save(projects) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); } catch {}
}

let projects = load();
let selectedId = null;
let currentCat = "All";
let searchQ = "";
let mode = "view"; // view | edit | add
let editData = null;
let tagInputVal = "";

function genId() { return "proj-" + Date.now() + "-" + Math.random().toString(36).slice(2,6); }

function filtered() {
  return projects.filter(p => {
    const catOk = currentCat === "All" || p.category === currentCat;
    const q = searchQ.toLowerCase();
    const srchOk = !q || p.title.toLowerCase().includes(q) || p.description.toLowerCase().includes(q) || (p.tags||[]).some(t=>t.includes(q));
    return catOk && srchOk;
  });
}

function renderSidebar() {
  const sb = document.getElementById("sidebar");
  sb.innerHTML = CATEGORIES.map(cat => `
    <button class="cat-btn ${currentCat===cat?'active':''}" data-cat="${cat}">
      ${cat!=="All"?`<span style="opacity:0.4">${CAT_SIGILS[cat]||""}</span>`:""}
      ${cat==="All"?"All Projects":cat}
    </button>
  `).join("");
  sb.querySelectorAll(".cat-btn").forEach(b => b.addEventListener("click", () => {
    currentCat = b.dataset.cat; selectedId = null; mode = "view"; editData = null; render();
  }));
}

function renderList() {
  const f = filtered();
  document.getElementById("header-meta").textContent = `· SDJ · ${projects.length} entries`;
  document.getElementById("count-label").textContent = `${f.length} project${f.length!==1?"s":""}`;
  const list = document.getElementById("list");
  list.innerHTML = f.map(p => `
    <div class="list-item ${selectedId===p.id?'active':''}" data-id="${p.id}">
      <div class="item-title">${p.title}</div>
      <div class="item-sub"><span style="color:${STATUS_COLORS[p.status]||'#333'}">■</span> ${p.status} · ${p.category}</div>
    </div>
  `).join("");
  list.querySelectorAll(".list-item").forEach(el => el.addEventListener("click", () => {
    selectedId = el.dataset.id; mode = "view"; editData = null; render();
  }));
}

function renderDetail() {
  const dp = document.getElementById("detail-pane");
  if (mode === "add" || mode === "edit") { renderForm(dp); return; }
  if (!selectedId) {
    dp.innerHTML = `<div class="empty-state"><div class="empty-icon">∅</div><div>Select a project to view</div><div style="margin-top:8px;color:#1a1a1e;font-size:9px">or add a new entry</div></div>`;
    return;
  }
  const p = projects.find(x=>x.id===selectedId);
  if (!p) { dp.innerHTML = ""; return; }
  dp.innerHTML = `
    <div class="case-header">
      <div>
        <div class="case-title">${p.title}</div>
        <div class="case-meta">${CAT_SIGILS[p.category]||""} ${p.category} · Updated ${p.updatedAt}</div>
      </div>
      <span class="status-badge" style="background:${STATUS_COLORS[p.status]||'#333'};color:#c8c4bc">${p.status}</span>
    </div>
    <div class="section"><div class="section-label">Description</div><div class="section-text">${p.description}</div></div>
    ${p.notes?`<div class="section"><div class="section-label">Notes</div><div class="section-text">${p.notes}</div></div>`:""}
    ${p.url?`<div class="section"><div class="section-label">Link</div><a href="${p.url}" target="_blank" rel="noreferrer" class="link">${p.url}</a></div>`:""}
    ${p.tags?.length?`<div class="section"><div class="section-label">Tags</div><div class="tag-wrap">${p.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div></div>`:""}
    <div class="action-row">
      <button class="action-btn" id="edit-btn">Edit</button>
      <button class="action-btn del-btn" id="del-btn">Remove</button>
    </div>
  `;
  document.getElementById("edit-btn").addEventListener("click", () => {
    editData = {...p, tags:[...(p.tags||[])]};
    mode = "edit"; tagInputVal = ""; render();
  });
  document.getElementById("del-btn").addEventListener("click", () => {
    if (!confirm("Remove this project?")) return;
    projects = projects.filter(x=>x.id!==p.id);
    save(projects); selectedId = null; render();
  });
}

function renderForm(dp) {
  const d = editData;
  dp.innerHTML = `
    <div id="form-pane">
      <div class="form-title">${mode==="add"?"// New Project":"// Edit Project"}</div>
      <div class="field"><label>Title</label><input id="f-title" value="${esc(d.title)}"/></div>
      <div class="field-row">
        <div class="field"><label>Category</label><select id="f-cat">${CATEGORIES.filter(c=>c!=="All").map(c=>`<option ${c===d.category?"selected":""}>${c}</option>`).join("")}</select></div>
        <div class="field"><label>Status</label><select id="f-status">${STATUSES.map(s=>`<option ${s===d.status?"selected":""}>${s}</option>`).join("")}</select></div>
      </div>
      <div class="field"><label>Description</label><textarea id="f-desc">${esc(d.description)}</textarea></div>
      <div class="field"><label>URL / Link</label><input id="f-url" value="${esc(d.url)}"/></div>
      <div class="field"><label>Notes</label><textarea id="f-notes" style="min-height:55px">${esc(d.notes)}</textarea></div>
      <div class="field">
        <label>Tags</label>
        <div class="tag-input-row"><input id="f-tag-in" placeholder="add tag..." value="${esc(tagInputVal)}"/><button class="tag-add-btn" id="tag-add-btn">+ Add</button></div>
        <div id="tag-list" style="margin-top:7px;display:flex;flex-wrap:wrap">${(d.tags||[]).map(t=>`<span class="removable-tag">${t}<button class="remove-tag-btn" data-tag="${t}">×</button></span>`).join("")}</div>
      </div>
      <div class="form-actions">
        <button class="save-btn" id="form-save">Save</button>
        <button class="cancel-btn" id="form-cancel">Cancel</button>
      </div>
    </div>
  `;
  document.getElementById("f-title").addEventListener("input", e => editData.title = e.target.value);
  document.getElementById("f-cat").addEventListener("change", e => editData.category = e.target.value);
  document.getElementById("f-status").addEventListener("change", e => editData.status = e.target.value);
  document.getElementById("f-desc").addEventListener("input", e => editData.description = e.target.value);
  document.getElementById("f-url").addEventListener("input", e => editData.url = e.target.value);
  document.getElementById("f-notes").addEventListener("input", e => editData.notes = e.target.value);
  document.getElementById("f-tag-in").addEventListener("input", e => tagInputVal = e.target.value);
  document.getElementById("f-tag-in").addEventListener("keydown", e => { if(e.key==="Enter"){e.preventDefault();addTag();} });
  document.getElementById("tag-add-btn").addEventListener("click", addTag);
  document.querySelectorAll(".remove-tag-btn").forEach(b => b.addEventListener("click", () => {
    editData.tags = editData.tags.filter(t=>t!==b.dataset.tag); renderForm(dp);
  }));
  document.getElementById("form-save").addEventListener("click", () => {
    const now = new Date().toISOString().slice(0,7);
    const proj = {...editData, updatedAt: now};
    if (mode === "edit") { projects = projects.map(p=>p.id===proj.id?proj:p); }
    else { projects.push(proj); }
    save(projects); selectedId = proj.id; mode = "view"; editData = null; render();
  });
  document.getElementById("form-cancel").addEventListener("click", () => {
    mode = "view"; editData = null; render();
  });
}

function addTag() {
  const inp = document.getElementById("f-tag-in");
  const t = (inp?.value||tagInputVal).trim().toLowerCase();
  if (t && !(editData.tags||[]).includes(t)) { editData.tags = [...(editData.tags||[]), t]; }
  tagInputVal = "";
  const dp = document.getElementById("detail-pane");
  renderForm(dp);
  const newInp = document.getElementById("f-tag-in");
  if (newInp) newInp.focus();
}

function esc(s) { return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function render() {
  renderSidebar();
  renderList();
  renderDetail();
}

document.getElementById("search").addEventListener("input", e => { searchQ = e.target.value; render(); });
document.getElementById("add-btn").addEventListener("click", () => {
  const now = new Date().toISOString().slice(0,7);
  editData = { id: genId(), title:"", category:"Apps & Tools", status:"Active", description:"", tags:[], url:"", notes:"", updatedAt: now };
  mode = "add"; tagInputVal = ""; selectedId = null; render();
});

render();
</script>
